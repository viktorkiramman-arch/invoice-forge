services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/invoice-forge.db
      API_PORT: 3001
      WEB_ORIGIN: http://localhost:8080
      CHROMIUM_PATH: /usr/bin/chromium
      PDF_STORAGE_DIR: /app/data/pdfs
    command: ["sh", "-c", "npx prisma migrate deploy && node apps/api/dist/server.js"]
    volumes:
      - invoice_data:/app/data
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invoice_data:
